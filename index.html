<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon.png">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <title>子午流注-合於日月</title>
    <style>
        :root {
            --bg: #0f0e0c; --gold: #d4a75b; --green: #4fac8d; --red: #ff3e3e;
            --grid: rgba(212, 167, 91, 0.15); --glow: drop-shadow(0 0 10px var(--green));
            --center-glow: drop-shadow(0 0 15px var(--gold)) drop-shadow(0 0 50px rgba(212, 167, 91, 0.5));
            --trans: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.light-theme {
            --bg: #f1e7d0; --gold: #5d4037; --green: #2e5a4b; --red: #a93226;
            --grid: rgba(60, 60, 60, 0.25); --glow: none;
            --center-glow: drop-shadow(0 0 15px rgba(139, 107, 61, 0.3));
        }

        body.minimal-mode .outer-ring, body.minimal-mode .center-display, body.minimal-mode .lunar-footer, body.minimal-mode #gridLines, body.minimal-mode #activeSector { 
            opacity: 0 !important; visibility: hidden !important; 
        }
        body.minimal-mode .theme-switch { opacity: 0.5; } body.minimal-mode .theme-switch:hover { opacity: 1; }

        body { 
            background: var(--bg); color: var(--gold); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            transition: var(--trans); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; overflow: hidden;
        }

        .clock-wrapper { position: relative; width: min(95vmin, 550px); height: min(95vmin, 550px); cursor: pointer; z-index: 5; transition: transform 0.2s; }
        .clock-wrapper:active { transform: scale(0.98); }
        svg { width: 100%; height: 100%; display: block; overflow: visible; }
        
        .center-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; pointer-events: none; width: 65%; transition: var(--trans); }
        
        .big-branch { font-size: clamp(32px, 14vmin, 75px); color: var(--green); filter: var(--glow); line-height: 1; margin-bottom: 12px; }
        .date-row { font-size: clamp(10px, 2.9vmin, 16px); margin: 4px 0; opacity: 0.8; letter-spacing: 1px; }
        .time-row { font-family: monospace; font-size: clamp(18px, 4.5vmin, 24px); font-weight: bold; margin: 6px 0; letter-spacing: 1px; }
        .ganzhi-row { color: var(--green); font-size: clamp(12px, 3.2vmin, 18px); font-weight: bold; margin-top: 4px; }
        
        .lunar-footer { margin-top: 25px; padding: 10px 30px; border: 1.5px solid var(--gold); border-radius: 30px; background: rgba(139, 107, 61, 0.05); font-size: clamp(14px, 3.6vmin, 20px); letter-spacing: 2px; transition: var(--trans); pointer-events: none; }

        .theme-switch { margin-top: 35px; display: flex; gap: 40px; transition: var(--trans); z-index: 20; position: relative; }
        .btn { width: 30px; height: 30px; border-radius: 50%; border: 2.2px solid var(--gold); cursor: pointer; transition: var(--trans); opacity: 0.4; }
        .btn.active { transform: scale(1.25); border-width: 4px; opacity: 1; }

        #secondProgress { stroke: var(--gold); stroke-width: 1.8; fill: none; stroke-linecap: round; }
        
        /* V7.3 射線顏色邏輯修正 */
        #hourHandLine, #minHandLine { stroke: var(--red); stroke-linecap: round; opacity: 0; transition: var(--trans); pointer-events: none; }
        body.minimal-mode #hourHandLine, body.minimal-mode #minHandLine { opacity: 0.5; }
        
        /* 淺色模式下的射線顏色換成與主星同色系的深古銅 */
        body.light-theme #hourHandLine, body.light-theme #minHandLine { stroke: var(--gold); opacity: 0; }
        body.light-theme.minimal-mode #hourHandLine, body.light-theme.minimal-mode #minHandLine { opacity: 0.65; }
        
        #centerDot { 
            fill: url(#starGradient); 
            filter: var(--center-glow); 
            opacity: 0; 
            visibility: hidden;
            transition: var(--trans); 
            pointer-events: none; 
        }
        body.minimal-mode #centerDot { opacity: 1 !important; visibility: visible !important; }
    </style>
</head>
<body class="dark">

<div class="clock-wrapper" onclick="toggleMinimal()">
    <svg viewBox="0 0 500 500">
        <defs>
            <radialGradient id="starGradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="white" />
                <stop offset="35%" stop-color="white" />
                <stop offset="100%" stop-color="var(--gold)" />
            </radialGradient>
        </defs>
        
        <g class="outer-ring">
            <circle cx="250" cy="250" r="230" fill="none" stroke="var(--grid)" stroke-width="1"/> 
            <circle cx="250" cy="250" r="175" fill="none" stroke="var(--grid)" stroke-width="1.5"/> 
        </g>
        <circle cx="250" cy="250" r="120" fill="none" stroke="var(--grid)" stroke-width="1"/> 
        <g id="gridLines"></g>
        <line id="hourHandLine" x1="250" y1="250" /><line id="minHandLine" x1="250" y1="250" />
        
        <circle id="centerDot" cx="250" cy="250" r="14" />

        <circle id="timeLink" cx="250" cy="250" r="120" stroke="var(--red)" stroke-width="3.75" fill="none" transform="rotate(-90 250 250)" opacity="0.4"></circle>
        <circle id="secondProgress" cx="250" cy="250" r="120" transform="rotate(-90 250 250)"></circle>
        <path id="activeSector" fill="rgba(79, 172, 141, 0.12)" stroke="var(--green)" stroke-width="2.5"></path>
        <g id="hourMarkers"></g>
        <circle id="greenDot" r="5.5" fill="var(--green)" class="outer-ring" /> 
        <circle id="redHourDot" r="6" fill="var(--red)" /> 
        <circle id="redMinDot" r="4" fill="var(--red)" opacity="0.8" /> 
        <g id="labels" class="outer-ring"></g>
    </svg>
    <div class="center-display">
        <div class="big-branch" id="cb">--</div>
        <div class="date-row" id="cd">--</div>
        <div class="time-row" id="ct">--:--:--</div>
        <div class="ganzhi-row" id="cg">--</div>
        <div id="st" style="font-weight:bold; margin-top:10px; font-size: clamp(14px, 3.8vmin, 20px);">--</div>
    </div>
</div>

<div class="lunar-footer" id="lf">--</div>

<div class="theme-switch">
    <div class="btn btn-black active" onclick="setTheme(event, 'dark')" style="background:#0f0e0c"></div>
    <div class="btn btn-white" onclick="setTheme(event, 'light')" style="background:#f1e7d0"></div>
</div>

<script>
    function setTheme(e, mode) {
        if(e) e.stopPropagation(); 
        document.body.classList.toggle('light-theme', mode === 'light');
        document.querySelectorAll('.btn').forEach((b,i) => b.classList.toggle('active', (mode==='light'&&i===1) || (mode==='dark'&&i===0)));
        localStorage.setItem('theme', mode);
    }
    if(localStorage.getItem('theme') === 'light') setTheme(null, 'light');

    function toggleMinimal() {
        document.body.classList.toggle('minimal-mode');
        localStorage.setItem('minimal', document.body.classList.contains('minimal-mode'));
    }
    if(localStorage.getItem('minimal') === 'true') toggleMinimal();

    const data = [{ b: "子", o: "膽" }, { b: "丑", o: "肝" }, { b: "寅", o: "肺" }, { b: "卯", o: "大腸" }, { b: "辰", o: "胃" }, { b: "巳", o: "脾" }, { b: "午", o: "心" }, { b: "未", o: "小腸" }, { b: "申", o: "膀胱" }, { b: "酉", o: "腎" }, { b: "戌", o: "心包" }, { b: "亥", o: "三焦" }];
    const CIRCUMFERENCE = 2 * Math.PI * 120;
    const polarToCartesian = (r, deg) => ({ x: 250 + (r * Math.cos((deg - 90) * Math.PI / 180.0)), y: 250 + (r * Math.sin((deg - 90) * Math.PI / 180.0)) });

    function init() {
        const gridG = document.getElementById('gridLines'), markersG = document.getElementById('hourMarkers'), labelsG = document.getElementById('labels');
        document.getElementById('secondProgress').style.strokeDasharray = CIRCUMFERENCE;
        document.getElementById('timeLink').style.strokeDasharray = CIRCUMFERENCE;
        data.forEach((item, i) => {
            const deg = i * 30;
            const mp = polarToCartesian(120, deg);
            const marker = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            marker.setAttribute("cx", mp.x); marker.setAttribute("cy", mp.y); marker.setAttribute("r", "2.8"); marker.setAttribute("fill", "var(--gold)");
            markersG.appendChild(marker);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            const p1 = polarToCartesian(120, deg - 15), p2 = polarToCartesian(230, deg - 15);
            line.setAttribute("x1", p1.x); line.setAttribute("y1", p1.y); line.setAttribute("x2", p2.x); line.setAttribute("y2", p2.y);
            line.setAttribute("stroke", "var(--grid)"); gridG.appendChild(line);
            const po = polarToCartesian(205, deg); labelsG.innerHTML += `<text x="${po.x}" y="${po.y}" fill="var(--green)" font-size="16" font-weight="bold" text-anchor="middle" dominant-baseline="middle">${item.o}</text>`;
            const pb = polarToCartesian(150, deg); labelsG.innerHTML += `<text x="${pb.x}" y="${pb.y}" fill="var(--gold)" font-size="23" font-weight="bold" text-anchor="middle" dominant-baseline="middle">${item.b}</text>`;
        });
    }

    function update() {
        const now = new Date(); const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
        if (typeof Lunar !== 'undefined') {
            try {
                const l = Solar.fromDate(now).getLunar();
                const g = l.getYearGanByLiChun(), z = l.getYearZhiByLiChun();
                const yearAlias = ({'甲':'青','乙':'青','丙':'赤','丁':'赤','戊':'黃','己':'黃','庚':'白','辛':'白','壬':'黑','癸':'黑'}[g]||'') + ({'子':'鼠','丑':'牛','寅':'虎','卯':'兔','辰':'龍','巳':'蛇','午':'馬','未':'羊','申':'猴','酉':'雞','戌':'狗','亥':'豬'}[z]||'');
                document.getElementById('cd').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
                document.getElementById('cg').innerText = `${l.getYearInGanZhi()}年 ${l.getMonthInGanZhi()}月 ${l.getDayInGanZhi()}日`;
                document.getElementById('st').innerText = l.getPrevJieQi().getName(); 
                document.getElementById('lf').innerText = `${yearAlias}年 ${l.getMonthInChinese()}月 ${l.getDayInChinese()}`;
            } catch(e) {}
        }
        document.getElementById('secondProgress').style.strokeDashoffset = CIRCUMFERENCE * (1 - (s + ms / 1000) / 60);
        document.getElementById('timeLink').style.strokeDashoffset = CIRCUMFERENCE * (1 - (m + s / 60) / 60);
        const degH = ((h % 12) * 3600 + m * 60 + s) / 43200 * 360, degM = (m * 60 + s) / 3600 * 360, deg24 = (h * 3600 + m * 60 + s) / 86400 * 360;
        const ph = polarToCartesian(120, degH), pm = polarToCartesian(120, degM);
        document.getElementById('redHourDot').setAttribute("cx", ph.x); document.getElementById('redHourDot').setAttribute("cy", ph.y);
        document.getElementById('redMinDot').setAttribute("cx", pm.x); document.getElementById('redMinDot').setAttribute("cy", pm.y);
        document.getElementById('greenDot').setAttribute("cx", polarToCartesian(230, deg24).x); document.getElementById('greenDot').setAttribute("cy", polarToCartesian(230, deg24).y);
        document.getElementById('hourHandLine').setAttribute("x2", ph.x); document.getElementById('hourHandLine').setAttribute("y2", ph.y); document.getElementById('hourHandLine').setAttribute("stroke-width", 6);
        document.getElementById('minHandLine').setAttribute("x2", pm.x); document.getElementById('minHandLine').setAttribute("y2", pm.y); document.getElementById('minHandLine').setAttribute("stroke-width", 4);
        let idx = Math.floor((h + 1) / 2) % 12;
        const sA = idx * 30 - 15, eA = idx * 30 + 15, pS1 = polarToCartesian(230, sA), pS2 = polarToCartesian(230, eA), pS3 = polarToCartesian(175, eA), pS4 = polarToCartesian(175, sA);
        document.getElementById('activeSector').setAttribute("d", `M ${pS4.x} ${pS4.y} L ${pS1.x} ${pS1.y} A 230 230 0 0 1 ${pS2.x} ${pS2.y} L ${pS3.x} ${pS3.y} A 175 175 0 0 0 ${pS4.x} ${pS4.y}`);
        document.getElementById('cb').innerText = data[idx].b; document.getElementById('ct').innerText = now.toLocaleTimeString('zh-TW', {hour12:false});
    }
    init(); setInterval(update, 50); update();
</script>
</body>
</html>
